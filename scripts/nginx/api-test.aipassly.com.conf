# api-test.aipassly.com — 测试 API（Nginx 反代 → 127.0.0.1:4001）
#
# 部署步骤（证书不存在时必须先走 HTTP，再签证书）：
#
# 1) 仅启用下面「阶段一」server 块，禁用「阶段二」
#    sudo cp scripts/nginx/api-test.aipassly.com.conf /etc/nginx/sites-available/
#    sudo ln -sf /etc/nginx/sites-available/api-test.aipassly.com.conf /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
# 2) 申请证书（任选其一）：
#    sudo certbot certonly --nginx -d api-test.aipassly.com
#    或: sudo certbot --nginx -d api-test.aipassly.com
#
# 3) 启用「阶段二」HTTPS 块，reload nginx
#
# 生产 api.aipassly.com 继续指向 127.0.0.1:4000，互不影响。

# ── 阶段一：仅 HTTP（签证书前用这个）────────────────────────────
server {
    listen 80;
    server_name api-test.aipassly.com;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}


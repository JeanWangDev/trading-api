services:
  mysql:
    image: mysql:8.4
    container_name: trading-api-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-trading_api}
      MYSQL_USER: ${DB_USER:-trading}
      MYSQL_PASSWORD: ${DB_PASSWORD:-trading123}
      TZ: UTC
    volumes:
      - trading_mysql_data:/var/lib/mysql
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u${DB_USER:-trading}",
          "-p${DB_PASSWORD:-trading123}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  trading_mysql_data:
